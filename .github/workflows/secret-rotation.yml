name: Secret Rotation Reminder

on:
  schedule:
    - cron: "0 9 1 */3 *"  # 9am UTC on the 1st of every 3rd month
  workflow_dispatch:        # allow manual trigger

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Create secret rotation reminder issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `🔐 Scheduled Secret Rotation Reminder – ${new Date().toISOString().slice(0, 10)}`;
            const body = `
            ## Secret Rotation Checklist

            This issue is auto-generated every 90 days. Please rotate the following secrets in **GitHub → Settings → Secrets and variables → Actions** and update any dependent services.

            ### Azure Credentials
            - [ ] \`ARM_CLIENT_ID\`
            - [ ] \`ARM_CLIENT_SECRET\`
            - [ ] \`ARM_SUBSCRIPTION_ID\`
            - [ ] \`ARM_TENANT_ID\`

            ### Docker Hub
            - [ ] \`DOCKER_USERNAME\`
            - [ ] \`DOCKER_PASSWORD\`

            ### VM Access
            - [ ] \`VM_SSH_KEY\` (private key)
            - [ ] \`VM_SSH_PUBLIC_KEY\` (public key — update in Terraform too)
            - [ ] \`VM_USER\`

            ### Azure Storage
            - [ ] \`AZURE_STORAGE_CONNECTION_STRING\`

            ### GitHub
            - [ ] \`PAT_TOKEN\` — check expiry and renew if needed

            ---
            **After rotating**, close this issue and confirm all pipelines pass on a test run.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["security", "maintenance"]
            });
