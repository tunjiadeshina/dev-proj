name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - dev        
      - stage      
      - main       

env:
  IMAGE_NAME: adetunjiadeshina/devops-app

jobs:
  # ── Build & Test ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r app/ -ll

      - name: Dependency Check
        run: |
          pip install safety
          safety check -r app/requirements.txt

  # ── Docker Build & Push ───────────────────────────────────────
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set image tag based on branch
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "TAG=dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            echo "TAG=stage" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAG=prod" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        run: |
          TAG=${{ steps.tag.outputs.TAG }}
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:$TAG
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:$TAG

  # ── Deploy to Dev (Automatic on push to dev) ──────────────────
  deploy-dev:
    needs: docker-build-push
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Deploy to Dev VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            IMAGE="adetunjiadeshina/devops-app:dev"
            docker pull $IMAGE
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              $IMAGE
            docker ps | grep devops-app

  # ── Deploy to Stage (Manual approval, from stage branch) ──────
  deploy-stage:
    needs: docker-build-push
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    environment:
      name: stage       # GitHub will pause here and wait for approval
    steps:
      - name: Deploy to Stage VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            IMAGE="adetunjiadeshina/devops-app:stage"
            docker pull $IMAGE
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              $IMAGE
            docker ps | grep devops-app

  # ── Deploy to Prod (Manual approval, from main branch) ────────
  deploy-prod:
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: main        # 👈 matches your GitHub environment name
    steps:
      - name: Deploy to Prod VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}       # 👈 secrets scoped to main environment
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            IMAGE="adetunjiadeshina/devops-app:prod"
            docker pull $IMAGE
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              $IMAGE
            docker ps | grep devops-app