name: CI/CD Pipeline

on:
  push:
    branches: [ "dev", "stage", "main" ]
  pull_request:
    branches: [ "dev", "stage", "main" ]

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  IMAGE_NAME: adetunjiadeshina/devops-app

jobs:
  # ── 1. Build & Test ───────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r app/ -ll

      - name: Dependency Check
        run: |
          pip install safety
          safety check -r app/requirements.txt

  # ── 2. Docker Build & Push ────────────────────────────────────
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set image tag based on branch
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [[ "$BRANCH" == "dev" ]]; then
            echo "TAG=dev" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "stage" ]]; then
            echo "TAG=stage" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            echo "TAG=prod" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev" >> $GITHUB_OUTPUT
          fi

      - name: Validate tag
        run: |
          if [ -z "${{ steps.tag.outputs.TAG }}" ]; then
            echo "ERROR: TAG is empty, cannot build image"
            exit 1
          fi
          echo "Building with tag: ${{ steps.tag.outputs.TAG }}"

      - name: Build and push Docker image
        run: |
          TAG=${{ steps.tag.outputs.TAG }}
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:$TAG
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:$TAG

  # ── 3. Terraform - Dev ────────────────────────────────────────
  terraform-dev:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    defaults:
      run:
        working-directory: terraform/dev
    outputs:
      vm_ip: ${{ steps.tf_output.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Get VM IP
        id: tf_output
        run: echo "vm_ip=$(terraform output -raw vm_public_ip)" >> $GITHUB_OUTPUT

      - name: Save Dev VM IP to blob storage
        run: |
          echo "${{ steps.tf_output.outputs.vm_ip }}" > /tmp/dev.ip
          az storage blob upload \
            --account-name belvadtfstate \
            --container-name tfstate \
            --name vm-ips/dev.ip \
            --file /tmp/dev.ip \
            --overwrite \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

  # ── 4. Deploy to Dev ──────────────────────────────────────────
  deploy-dev:
    needs: terraform-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment:
      name: dev
    steps:
      - name: Deploy to Dev VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform-dev.outputs.vm_ip }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            # ── Bootstrap Docker ─────────────────────────────────
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io
            fi
            sudo systemctl enable docker
            sudo systemctl start docker

            # ── Deploy App ───────────────────────────────────────
            IMAGE="adetunjiadeshina/devops-app:dev"
            VERSION="${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)"
            COMMIT="${GITHUB_SHA}"
            ENVIRONMENT="dev"

            echo "📦 Pulling new image..."
            sudo docker pull $IMAGE

            echo "💾 Saving current running image (if exists)..."
            PREVIOUS_IMAGE=$(sudo docker inspect --format='{{.Config.Image}}' devops-app 2>/dev/null || echo "")

            echo "🛑 Stopping existing container..."
            sudo docker stop devops-app || true
            sudo docker rm devops-app || true

            echo "🚀 Starting new container..."
            sudo docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              -e APP_VERSION=$VERSION \
              -e APP_COMMIT=$COMMIT \
              -e APP_ENV=$ENVIRONMENT \
              $IMAGE

            echo "⏳ Waiting for application to start..."
            sleep 10

            echo "🩺 Running health check..."
            if curl -f http://localhost/health; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Deployment failed! Initiating rollback..."
              sudo docker stop devops-app || true
              sudo docker rm devops-app || true
              if [ ! -z "$PREVIOUS_IMAGE" ]; then
                echo "🔙 Rolling back to previous image: $PREVIOUS_IMAGE"
                sudo docker run -d \
                  -p 80:8000 \
                  --name devops-app \
                  --restart unless-stopped \
                  $PREVIOUS_IMAGE
                echo "✅ Rollback successful!"
              else
                echo "⚠️ No previous image found, manual intervention required!"
              fi
              exit 1
            fi

            # ── Deploy Node Exporter ─────────────────────────────
            sudo docker stop node-exporter || true
            sudo docker rm node-exporter || true
            sudo docker run -d \
              --name node-exporter \
              --restart unless-stopped \
              --network="host" \
              --pid="host" \
              -v /proc:/host/proc:ro \
              -v /sys:/host/sys:ro \
              -v /:/rootfs:ro \
              prom/node-exporter \
              --path.procfs=/host/proc \
              --path.sysfs=/host/sys \
              --path.rootfs=/rootfs \
              --collector.filesystem.mount-points-exclude='^/(sys|proc|dev|host|etc)($$|/)'

            echo "✅ App and Node Exporter running on dev"
            sudo docker ps

  # ── Auto promote Dev → Stage ──────────────────────────────────
  promote-dev-to-stage:
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Merge dev into stage
        run: |
          git fetch --all
          git checkout stage
          git merge origin/dev --no-edit
          git push origin stage

  # ── 5. Terraform - Stage ──────────────────────────────────────
  terraform-stage:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    defaults:
      run:
        working-directory: terraform/stage
    outputs:
      vm_ip: ${{ steps.tf_output.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Get VM IP
        id: tf_output
        run: echo "vm_ip=$(terraform output -raw vm_public_ip)" >> $GITHUB_OUTPUT

      - name: Save Stage VM IP to blob storage
        run: |
          echo "${{ steps.tf_output.outputs.vm_ip }}" > /tmp/stage.ip
          az storage blob upload \
            --account-name belvadtfstate \
            --container-name tfstate \
            --name vm-ips/stage.ip \
            --file /tmp/stage.ip \
            --overwrite \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

  # ── 6. Deploy to Stage ────────────────────────────────────────
  deploy-stage:
    needs: terraform-stage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    environment:
      name: stage
    steps:
      - name: Deploy to Stage VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform-stage.outputs.vm_ip }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            # ── Bootstrap Docker ─────────────────────────────────
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io
            fi
            sudo systemctl enable docker
            sudo systemctl start docker

            # ── Deploy App ───────────────────────────────────────
            IMAGE="adetunjiadeshina/devops-app:stage"
            VERSION="${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)"
            COMMIT="${GITHUB_SHA}"
            ENVIRONMENT="stage"

            echo "📦 Pulling new image..."
            sudo docker pull $IMAGE

            echo "💾 Saving current running image (if exists)..."
            PREVIOUS_IMAGE=$(sudo docker inspect --format='{{.Config.Image}}' devops-app 2>/dev/null || echo "")

            echo "🛑 Stopping existing container..."
            sudo docker stop devops-app || true
            sudo docker rm devops-app || true

            echo "🚀 Starting new container..."
            sudo docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              -e APP_VERSION=$VERSION \
              -e APP_COMMIT=$COMMIT \
              -e APP_ENV=$ENVIRONMENT \
              $IMAGE

            echo "⏳ Waiting for application to start..."
            sleep 10

            echo "🩺 Running health check..."
            if curl -f http://localhost/health; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Deployment failed! Initiating rollback..."
              sudo docker stop devops-app || true
              sudo docker rm devops-app || true
              if [ ! -z "$PREVIOUS_IMAGE" ]; then
                echo "🔙 Rolling back to previous image: $PREVIOUS_IMAGE"
                sudo docker run -d \
                  -p 80:8000 \
                  --name devops-app \
                  --restart unless-stopped \
                  $PREVIOUS_IMAGE
                echo "✅ Rollback successful!"
              else
                echo "⚠️ No previous image found, manual intervention required!"
              fi
              exit 1
            fi

            # ── Deploy Node Exporter ─────────────────────────────
            sudo docker stop node-exporter || true
            sudo docker rm node-exporter || true
            sudo docker run -d \
              --name node-exporter \
              --restart unless-stopped \
              --network="host" \
              --pid="host" \
              -v /proc:/host/proc:ro \
              -v /sys:/host/sys:ro \
              -v /:/rootfs:ro \
              prom/node-exporter \
              --path.procfs=/host/proc \
              --path.sysfs=/host/sys \
              --path.rootfs=/rootfs \
              --collector.filesystem.mount-points-exclude='^/(sys|proc|dev|host|etc)($$|/)'

            echo "✅ App and Node Exporter running on stage"
            sudo docker ps

  # ── Auto promote Stage → Prod (manual approval gate) ──────────
  promote-stage-to-prod:
    needs: deploy-stage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Merge stage into main
        run: |
          git fetch --all
          git checkout main
          git merge origin/stage --no-edit
          git push origin main


  # ── 7. Terraform - Prod ───────────────────────────────────────
  terraform-prod:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    defaults:
      run:
        working-directory: terraform/prod
    outputs:
      vm_ip: ${{ steps.tf_output.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Get VM IP
        id: tf_output
        run: echo "vm_ip=$(terraform output -raw vm_public_ip)" >> $GITHUB_OUTPUT

      - name: Save Prod VM IP to blob storage
        run: |
          echo "${{ steps.tf_output.outputs.vm_ip }}" > /tmp/prod.ip
          az storage blob upload \
            --account-name belvadtfstate \
            --container-name tfstate \
            --name vm-ips/prod.ip \
            --file /tmp/prod.ip \
            --overwrite \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

  # ── 8. Deploy to Prod ─────────────────────────────────────────
  deploy-prod:
    needs: terraform-prod
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Deploy to Prod VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform-prod.outputs.vm_ip }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            # ── Bootstrap Docker ─────────────────────────────────
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io
            fi
            sudo systemctl enable docker
            sudo systemctl start docker

            # ── Deploy App ───────────────────────────────────────
            IMAGE="adetunjiadeshina/devops-app:prod"
            VERSION="${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)"
            COMMIT="${GITHUB_SHA}"
            ENVIRONMENT="prod"

            echo "📦 Pulling new image..."
            sudo docker pull $IMAGE

            echo "💾 Saving current running image (if exists)..."
            PREVIOUS_IMAGE=$(sudo docker inspect --format='{{.Config.Image}}' devops-app 2>/dev/null || echo "")

            echo "🛑 Stopping existing container..."
            sudo docker stop devops-app || true
            sudo docker rm devops-app || true

            echo "🚀 Starting new container..."
            sudo docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              -e APP_VERSION=$VERSION \
              -e APP_COMMIT=$COMMIT \
              -e APP_ENV=$ENVIRONMENT \
              $IMAGE

            echo "⏳ Waiting for application to start..."
            sleep 10

            echo "🩺 Running health check..."
            if curl -f http://localhost/health; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Deployment failed! Initiating rollback..."
              sudo docker stop devops-app || true
              sudo docker rm devops-app || true
              if [ ! -z "$PREVIOUS_IMAGE" ]; then
                echo "🔙 Rolling back to previous image: $PREVIOUS_IMAGE"
                sudo docker run -d \
                  -p 80:8000 \
                  --name devops-app \
                  --restart unless-stopped \
                  $PREVIOUS_IMAGE
                echo "✅ Rollback successful!"
              else
                echo "⚠️ No previous image found, manual intervention required!"
              fi
              exit 1
            fi

            # ── Deploy Node Exporter ─────────────────────────────
            sudo docker stop node-exporter || true
            sudo docker rm node-exporter || true
            sudo docker run -d \
              --name node-exporter \
              --restart unless-stopped \
              --network="host" \
              --pid="host" \
              -v /proc:/host/proc:ro \
              -v /sys:/host/sys:ro \
              -v /:/rootfs:ro \
              prom/node-exporter \
              --path.procfs=/host/proc \
              --path.sysfs=/host/sys \
              --path.rootfs=/rootfs \
              --collector.filesystem.mount-points-exclude='^/(sys|proc|dev|host|etc)($$|/)'

            echo "✅ App and Node Exporter running on prod"
            sudo docker ps

  # ── 9. Terraform - Monitoring ─────────────────────────────────
  terraform-monitoring:
    needs: deploy-prod
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: terraform/monitoring
    outputs:
      monitoring_ip: ${{ steps.tf_output.outputs.monitoring_ip }}
      dev_vm_ip: ${{ steps.read_ips.outputs.dev_vm_ip }}
      stage_vm_ip: ${{ steps.read_ips.outputs.stage_vm_ip }}
      prod_vm_ip: ${{ steps.read_ips.outputs.prod_vm_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Read all VM IPs from blob storage
        id: read_ips
        run: |
          az storage blob download \
            --account-name tfstatedevops \
            --container-name tfstate \
            --name vm-ips/dev.ip \
            --file /tmp/dev.ip \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            > /dev/null 2>&1 || true

          az storage blob download \
            --account-name tfstatedevops \
            --container-name tfstate \
            --name vm-ips/stage.ip \
            --file /tmp/stage.ip \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            > /dev/null 2>&1 || true

          az storage blob download \
            --account-name tfstatedevops \
            --container-name tfstate \
            --name vm-ips/prod.ip \
            --file /tmp/prod.ip \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            > /dev/null 2>&1 || true

          DEV_IP=$(cat /tmp/dev.ip 2>/dev/null | tr -d '[:space:]' || echo "0.0.0.0")
          STAGE_IP=$(cat /tmp/stage.ip 2>/dev/null | tr -d '[:space:]' || echo "0.0.0.0")
          PROD_IP=$(cat /tmp/prod.ip 2>/dev/null | tr -d '[:space:]' || echo "0.0.0.0")

          DEV_IP=$(cat /tmp/dev.ip 2>/dev/null | tr -d '[:space:]' || echo "0.0.0.0")
          STAGE_IP=$(cat /tmp/stage.ip 2>/dev/null | tr -d '[:space:]' || echo "0.0.0.0")
          PROD_IP=$(cat /tmp/prod.ip 2>/dev/null | tr -d '[:space:]' || echo "0.0.0.0")
  
          echo "dev_vm_ip=$DEV_IP" >> $GITHUB_OUTPUT
          echo "stage_vm_ip=$STAGE_IP" >> $GITHUB_OUTPUT
          echo "prod_vm_ip=$PROD_IP" >> $GITHUB_OUTPUT

          echo "✅ Dev IP: $DEV_IP"
          echo "✅ Stage IP: $STAGE_IP"
          echo "✅ Prod IP: $PROD_IP"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
          TF_VAR_dev_vm_ip: ${{ steps.read_ips.outputs.dev_vm_ip }}
          TF_VAR_stage_vm_ip: ${{ steps.read_ips.outputs.stage_vm_ip }}
          TF_VAR_prod_vm_ip: ${{ steps.read_ips.outputs.prod_vm_ip }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
          TF_VAR_dev_vm_ip: ${{ steps.read_ips.outputs.dev_vm_ip }}
          TF_VAR_stage_vm_ip: ${{ steps.read_ips.outputs.stage_vm_ip }}
          TF_VAR_prod_vm_ip: ${{ steps.read_ips.outputs.prod_vm_ip }}

      - name: Get Monitoring VM IP
        id: tf_output
        run: echo "monitoring_ip=$(terraform output -raw monitoring_vm_public_ip)" >> $GITHUB_OUTPUT

  # ── 10. Deploy Prometheus + Grafana ───────────────────────────
  deploy-monitoring:
    needs: terraform-monitoring
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Deploy Prometheus and Grafana
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform-monitoring.outputs.monitoring_ip }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          envs: DEV_VM_IP,STAGE_VM_IP,PROD_VM_IP
          script: |
            # ── Verify IPs ────────────────────────────────────────
            echo "DEV_VM_IP=$DEV_VM_IP"
            echo "STAGE_VM_IP=$STAGE_VM_IP"
            echo "PROD_VM_IP=$PROD_VM_IP"

            # ── Bootstrap Docker ─────────────────────────────────
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io
            fi
            sudo systemctl enable docker
            sudo systemctl start docker

            # ── Write Prometheus config ───────────────────────────
            sudo mkdir -p /etc/prometheus
            sudo tee /etc/prometheus/prometheus.yml > /dev/null << PROMEOF
            global:
              scrape_interval: 15s
              evaluation_interval: 15s

            scrape_configs:
              - job_name: 'node-dev'
                static_configs:
                  - targets: ['${DEV_VM_IP}:9100']
                    labels:
                      env: 'dev'
                      vm: 'dev-vm'

              - job_name: 'node-stage'
                static_configs:
                  - targets: ['${STAGE_VM_IP}:9100']
                    labels:
                      env: 'stage'
                      vm: 'stage-vm'

              - job_name: 'node-prod'
                static_configs:
                  - targets: ['${PROD_VM_IP}:9100']
                    labels:
                      env: 'prod'
                      vm: 'prod-vm'
            PROMEOF

            echo "✅ Prometheus config:"
            cat /etc/prometheus/prometheus.yml

            # ── Write Grafana datasource provisioning ─────────────
            sudo mkdir -p /etc/grafana/provisioning/datasources
            sudo tee /etc/grafana/provisioning/datasources/prometheus.yaml > /dev/null << GRAFEOF
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://localhost:9090
                isDefault: true
                jsonData:
                  timeInterval: "15s"
            GRAFEOF

            # ── Write Grafana dashboard provisioning config ────────
            sudo mkdir -p /etc/grafana/provisioning/dashboards
            sudo tee /etc/grafana/provisioning/dashboards/default.yaml > /dev/null << DASHPROVEOF
            apiVersion: 1
            providers:
              - name: default
                folder: DevOps
                type: file
                disableDeletion: false
                updateIntervalSeconds: 30
                allowUiUpdates: true
                options:
                  path: /var/lib/grafana/dashboards
            DASHPROVEOF

            # ── Write dashboard JSON ───────────────────────────────
            sudo mkdir -p /var/lib/grafana/dashboards
            sudo tee /var/lib/grafana/dashboards/devops-dashboard.json > /dev/null << 'DASHEOF'
            {
              "annotations": {"list": [{"builtIn": 1,"datasource": "-- Grafana --","enable": true,"hide": true,"iconColor": "rgba(0, 211, 255, 1)","name": "Annotations & Alerts","type": "dashboard"}]},
              "templating": {
                "list": [{"name": "env","type": "custom","label": "Environment","query": "dev,stage,prod","current": {"text": "All","value": "$__all"},"options": [{"text": "All","value": "$__all","selected": true},{"text": "dev","value": "dev"},{"text": "stage","value": "stage"},{"text": "prod","value": "prod"}],"includeAll": true,"multi": true,"hide": 0}]
              },
              "panels": [
                {"datasource": "Prometheus","title": "App Requests by Environment","type": "timeseries","targets": [{"expr": "sum(rate(app_requests_total{env=~\"$env\"}[1m])) by (env)","legendFormat": "{{env}} requests","refId": "A"}],"gridPos": {"x": 0,"y": 0,"w": 12,"h": 6},"fieldConfig": {"defaults": {"custom": {"lineWidth": 2},"color": {"mode": "palette-classic"}},"overrides": [{"matcher": {"id": "byName","options": "dev requests"},"properties": [{"id": "color","value": {"fixedColor": "#73BF69","mode": "fixed"}}]},{"matcher": {"id": "byName","options": "stage requests"},"properties": [{"id": "color","value": {"fixedColor": "#F2CC0C","mode": "fixed"}}]},{"matcher": {"id": "byName","options": "prod requests"},"properties": [{"id": "color","value": {"fixedColor": "#F15B26","mode": "fixed"}}]}]}},
                {"datasource": "Prometheus","title": "Request Latency 95th Percentile by Environment","type": "timeseries","targets": [{"expr": "histogram_quantile(0.95, sum(rate(app_request_duration_seconds_bucket{env=~\"$env\"}[1m])) by (le, env)) * 1000","legendFormat": "{{env}} p95 latency","refId": "A"}],"gridPos": {"x": 12,"y": 0,"w": 12,"h": 6},"fieldConfig": {"defaults": {"unit": "ms","custom": {"lineWidth": 2}}}},
                {"datasource": "Prometheus","title": "HTTP Status Codes by Environment","type": "timeseries","targets": [{"expr": "sum(rate(app_request_status_total{env=~\"$env\"}[1m])) by (status, env)","legendFormat": "{{env}} HTTP {{status}}","refId": "A"}],"gridPos": {"x": 0,"y": 6,"w": 12,"h": 6}},
                {"datasource": "Prometheus","title": "CPU Usage by Environment","type": "timeseries","targets": [{"expr": "100 - (avg by(env, vm) (irate(node_cpu_seconds_total{mode=\"idle\", env=~\"$env\"}[5m])) * 100)","legendFormat": "{{env}} - {{vm}}","refId": "A"}],"gridPos": {"x": 12,"y": 6,"w": 12,"h": 6},"fieldConfig": {"defaults": {"unit": "percent","min": 0,"max": 100,"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "yellow","value": 70},{"color": "red","value": 90}]}}}},
                {"datasource": "Prometheus","title": "Memory Usage by Environment","type": "timeseries","targets": [{"expr": "node_memory_MemTotal_bytes{env=~\"$env\"} - node_memory_MemAvailable_bytes{env=~\"$env\"}","legendFormat": "{{env}} - {{vm}} used","refId": "A"}],"gridPos": {"x": 0,"y": 12,"w": 12,"h": 6},"fieldConfig": {"defaults": {"unit": "bytes"}}},
                {"datasource": "Prometheus","title": "Memory Usage % by Environment","type": "gauge","targets": [{"expr": "100 * (1 - node_memory_MemAvailable_bytes{env=~\"$env\"} / node_memory_MemTotal_bytes{env=~\"$env\"})","legendFormat": "{{env}} - {{vm}}","refId": "A"}],"gridPos": {"x": 12,"y": 12,"w": 12,"h": 6},"fieldConfig": {"defaults": {"unit": "percent","min": 0,"max": 100,"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "yellow","value": 70},{"color": "red","value": 90}]}}}},
                {"datasource": "Prometheus","title": "Network Inbound by Environment","type": "timeseries","targets": [{"expr": "rate(node_network_receive_bytes_total{env=~\"$env\", device!=\"lo\"}[1m])","legendFormat": "{{env}} - {{vm}} {{device}} RX","refId": "A"}],"gridPos": {"x": 0,"y": 18,"w": 12,"h": 6},"fieldConfig": {"defaults": {"unit": "Bps"}}},
                {"datasource": "Prometheus","title": "Network Outbound by Environment","type": "timeseries","targets": [{"expr": "rate(node_network_transmit_bytes_total{env=~\"$env\", device!=\"lo\"}[1m])","legendFormat": "{{env}} - {{vm}} {{device}} TX","refId": "A"}],"gridPos": {"x": 12,"y": 18,"w": 12,"h": 6},"fieldConfig": {"defaults": {"unit": "Bps"}}},
                {"datasource": "Prometheus","title": "Disk Usage by Environment","type": "timeseries","targets": [{"expr": "100 - ((node_filesystem_avail_bytes{env=~\"$env\", mountpoint=\"/\", fstype!=\"tmpfs\"} / node_filesystem_size_bytes{env=~\"$env\", mountpoint=\"/\", fstype!=\"tmpfs\"}) * 100)","legendFormat": "{{env}} - {{vm}} disk %","refId": "A"}],"gridPos": {"x": 0,"y": 24,"w": 12,"h": 6},"fieldConfig": {"defaults": {"unit": "percent","min": 0,"max": 100,"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "yellow","value": 75},{"color": "red","value": 90}]}}}},
                {"datasource": "Prometheus","title": "Node Targets Health","type": "stat","targets": [{"expr": "up{env=~\"$env\"}","legendFormat": "{{env}} - {{vm}}","refId": "A"}],"gridPos": {"x": 12,"y": 24,"w": 12,"h": 6},"fieldConfig": {"defaults": {"mappings": [{"type": "value","options": {"0": {"text": "DOWN","color": "red"},"1": {"text": "UP","color": "green"}}}],"thresholds": {"mode": "absolute","steps": [{"color": "red","value": null},{"color": "green","value": 1}]}}}}
              ],
              "schemaVersion": 36,
              "version": 3,
              "title": "DevOps App Multi-Environment Dashboard",
              "tags": ["devops", "multi-env"],
              "time": {"from": "now-1h","to": "now"},
              "refresh": "30s"
            }
            DASHEOF

            # ── Fix permissions ───────────────────────────────────
            sudo chmod -R 755 /var/lib/grafana/dashboards
            sudo chmod -R 755 /etc/grafana/provisioning

            # ── Deploy Prometheus ─────────────────────────────────
            sudo docker stop prometheus || true
            sudo docker rm prometheus || true
            sudo docker run -d \
              -p 9090:9090 \
              --name prometheus \
              --restart unless-stopped \
              --network="host" \
              -v /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
              prom/prometheus

            # ── Deploy Grafana ────────────────────────────────────
            sudo docker stop grafana || true
            sudo docker rm grafana || true
            sudo docker run -d \
              -p 3000:3000 \
              --name grafana \
              --restart unless-stopped \
              -v grafana-storage:/var/lib/grafana \
              -v /etc/grafana/provisioning:/etc/grafana/provisioning \
              -v /var/lib/grafana/dashboards:/var/lib/grafana/dashboards \
              grafana/grafana

            echo "✅ Prometheus running at http://$HOSTNAME:9090"
            echo "✅ Grafana running at http://$HOSTNAME:3000"
            sudo docker ps
        env:
          DEV_VM_IP: ${{ needs.terraform-monitoring.outputs.dev_vm_ip }}
          STAGE_VM_IP: ${{ needs.terraform-monitoring.outputs.stage_vm_ip }}
          PROD_VM_IP: ${{ needs.terraform-monitoring.outputs.prod_vm_ip }}

          
          #Add dummy changes