name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t adetunjiadeshina/devops-app:${{ github.sha }} .
          docker tag adetunjiadeshina/devops-app:${{ github.sha }} adetunjiadeshina/devops-app:latest

      - name: Push Docker image
        run: |
          docker push adetunjiadeshina/devops-app:${{ github.sha }}
          docker push adetunjiadeshina/devops-app:latest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Ensure Docker is running
            sudo systemctl enable docker
            sudo systemctl start docker

            # Clean old container
            sudo docker rm -f devops-app || true

            # Pull latest image
            sudo docker pull adetunjiadeshina/devops-app:latest

            # Run new container
            sudo docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              adetunjiadeshina/devops-app:latest

            # Verify
            sudo docker ps | grep devops-app