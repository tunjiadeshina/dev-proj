name: DevOps CI/CD Pipeline

on:
  pull_request:
    branches: [ "dev", "stage", "main" ]
  push:
    branches: [ "dev", "stage", "main" ]
    tags:
      - 'v*.*.*'  # Optional for production releases

env:
  IMAGE_NAME: adetunjiadeshina/devops-app

jobs:
  # ── Build & Test ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - run: pip install -r app/requirements.txt

      - run: PYTHONPATH=. pytest

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r app/ -ll

      - name: Dependency Check
        run: |
          pip install safety
          safety check -r app/requirements.txt

  # ── Docker Build & Push ───────────────────────────────────────
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:dev
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:stage
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:prod
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Push Docker Images
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:dev
          docker push ${{ env.IMAGE_NAME }}:stage
          docker push ${{ env.IMAGE_NAME }}:prod
          docker push ${{ env.IMAGE_NAME }}:latest

  # ── Deploy to Dev (Auto) ──────────────────────────────────────
  deploy-dev:
    needs: docker-build-push
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_VM_HOST }}
          username: ${{ secrets.DEV_VM_USER }}
          key: ${{ secrets.DEV_VM_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:dev
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d -p 80:8000 --name devops-app --restart unless-stopped ${{ env.IMAGE_NAME }}:dev
            docker ps | grep devops-app

  # ── Deploy to Stage (Manual Approval) ─────────────────────────
  deploy-stage:
    needs: docker-build-push
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    environment:
      name: stage
      url: http://your-stage-url # Optional
    steps:
      - name: Wait for Manual Approval
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Stage
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGE_VM_HOST }}
          username: ${{ secrets.STAGE_VM_USER }}
          key: ${{ secrets.STAGE_VM_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:stage
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d -p 80:8000 --name devops-app --restart unless-stopped ${{ env.IMAGE_NAME }}:stage
            docker ps | grep devops-app

  # ── Deploy to Prod (Manual Approval) ──────────────────────────
  deploy-prod:
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: http://your-prod-url # Optional
    steps:
      - name: Wait for Manual Approval
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Prod
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VM_HOST }}
          username: ${{ secrets.PROD_VM_USER }}
          key: ${{ secrets.PROD_VM_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:prod
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d -p 80:8000 --name devops-app --restart unless-stopped ${{ env.IMAGE_NAME }}:prod
            docker ps | grep devops-app