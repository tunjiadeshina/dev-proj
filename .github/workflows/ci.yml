name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest

      - name: Build Docker image
        run: |
          docker build -t devops-app:${{ github.sha }} .

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Bootstrap VM & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            # ── System update ───────────────────────────────────────────────
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y

            # ── Install Docker (skip if already installed) ───────────────────
            if ! command -v docker &> /dev/null; then
              echo "Docker not found, installing..."

              sudo apt-get install -y \
                ca-certificates \
                curl \
                gnupg \
                lsb-release

              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io

              echo "Docker installed successfully"
            else
              echo "Docker already installed, skipping..."
            fi

            # ── Enable & start Docker service ────────────────────────────────
            sudo systemctl enable docker
            sudo systemctl start docker

            # Add user to docker group so sudo isn't needed on next run
            sudo usermod -aG docker $USER || true

            # ── Deploy container ─────────────────────────────────────────────
            sudo docker pull adetunjiadeshina/devops-app:latest
            sudo docker stop devops-app || true
            sudo docker rm devops-app || true
            sudo docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              adetunjiadeshina/devops-app:latest

            # ── Verify container is running ──────────────────────────────────
            sudo docker ps | grep devops-app