name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - dev        # triggers auto deploy to dev
      - stage      # triggers deploy to stage
      - main       # triggers deploy to prod
  pull_request:
    branches:
      - stage      # runs build/test checks only when PR targets stage
      - main       # runs build/test checks only when PR targets main  

env:
  IMAGE_NAME: adetunjiadeshina/devops-app

jobs:
  # ── Build & Test ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r app/ -ll

      - name: Dependency Check
        run: |
          pip install safety
          safety check -r app/requirements.txt

  # ── Docker Build & Push ───────────────────────────────────────
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set image tag based on branch
        id: tag
        run: |
          # Use base_ref for PRs, ref for direct pushes
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if [[ "$BRANCH" == "dev" ]]; then
            echo "TAG=dev" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "stage" ]]; then
            echo "TAG=stage" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            echo "TAG=prod" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev" >> $GITHUB_OUTPUT  # fallback
          fi

      - name: Validate tag
        run: |
          if [ -z "${{ steps.tag.outputs.TAG }}" ]; then
            echo "ERROR: TAG is empty, cannot build image"
            exit 1
          fi
          echo "Building with tag: ${{ steps.tag.outputs.TAG }}"  

      - name: Build and push Docker image
        run: |
          TAG=${{ steps.tag.outputs.TAG }}
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:$TAG
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:$TAG

  # ── Deploy to Dev (Automatic on push to dev) ──────────────────
  deploy-dev:
    needs: docker-build-push
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Deploy to Dev VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            IMAGE="adetunjiadeshina/devops-app:dev"
            echo "📦 Pulling new image..."
            docker pull $IMAGE

            echo "💾 Saving current running image (if exists)..."
            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' devops-app 2>/dev/null || echo "")
            
            echo "🛑 Stopping existing container..."
            docker stop devops-app || true
            docker rm devops-app || true

            echo "🚀 Starting new container..."
            docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              $IMAGE

            echo "⏳ Waiting for application to start..."
            sleep 10

            echo "🩺 Running health check..."
            if curl -f http://localhost/health; then
              echo "✅ Deployment successful!"
            else
              echo "❌ Deployment failed! Initiating rollback..."
              docker stop devops-app || true
              docker rm devops-app || true
              if [ ! -z "$PREVIOUS_IMAGE" ]; then
                echo "🔙 Rolling back to previous image: $PREVIOUS_IMAGE"
                docker run -d \
                  -p 80:8000 \
                  --name devops-app \
                  --restart unless-stopped \
                  $PREVIOUS_IMAGE
                echo "✅ Rollback successful!"
              else
                echo "⚠️ No previous image found, manual intervention required!"
              fi
              exit 1
            fi
            echo "📊 Verifying running container..."
            docker ps | grep devops-app

  # ── Deploy to Stage (Manual approval, from stage branch) ──────
  deploy-stage:
    needs: docker-build-push
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: stage       # GitHub will pause here and wait for approval
    steps:
      - name: Deploy to Stage VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            IMAGE="adetunjiadeshina/devops-app:stage"
            docker pull $IMAGE
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              $IMAGE
            docker ps | grep devops-app

  # ── Deploy to Prod (Manual approval, from main branch) ────────
  deploy-prod:
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: main        # 👈 matches your GitHub environment name
    steps:
      - name: Deploy to Prod VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}       # 👈 secrets scoped to main environment
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            IMAGE="adetunjiadeshina/devops-app:prod"
            docker pull $IMAGE
            docker stop devops-app || true
            docker rm devops-app || true
            docker run -d \
              -p 80:8000 \
              --name devops-app \
              --restart unless-stopped \
              $IMAGE
            docker ps | grep devops-app